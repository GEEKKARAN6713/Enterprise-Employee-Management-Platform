services:
  mysql:
    image: mysql:8.4
    container_name: emp-mgmt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: emp_mgmt
      MYSQL_USER: emp_user
      MYSQL_PASSWORD: emp_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: emp-mgmt-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: emp_mgmt
      DB_USER: emp_user
      DB_PASSWORD: emp_pass
      JWT_SECRET: ${JWT_SECRET:-Y2hhbmdlLW1lLXRvLWEtc2VjdXJlLTI1Ni1iaXQtc2VjcmV0LWtleS1mb3ItcHJvZHVjdGlvbg==}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  mysql_data:
