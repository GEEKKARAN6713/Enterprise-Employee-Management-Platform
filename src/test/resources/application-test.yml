spring:
  datasource:
    url: jdbc:h2:mem:empmgmt;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

app:
  jwt:
    secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 86400000
