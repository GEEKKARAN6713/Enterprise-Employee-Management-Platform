<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('Audit Logs')}"></head>
<body class="bg-dark text-light">
<div th:replace="~{admin/layout :: nav}"></div>
<main class="container-fluid px-4">
    <h1 class="h3 mb-4">Audit Logs</h1>
    <div class="card card-dark">
        <table class="table table-dark table-sm table-hover mb-0">
            <thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Entity</th><th>Details</th></tr></thead>
            <tbody>
            <tr th:each="a : ${page.content}">
                <td th:text="${#temporals.format(a.createdAt, 'yyyy-MM-dd HH:mm')}">Time</td>
                <td th:text="${a.actorEmail}">Actor</td>
                <td th:text="${a.action}">Action</td>
                <td th:text="${a.entityType + ' #' + a.entityId}">Entity</td>
                <td th:text="${a.details}">Details</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
