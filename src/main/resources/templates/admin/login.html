```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Management Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(
                135deg,
                #0f172a,
                #111827,
                #1e293b
            );
            font-family: Inter, sans-serif;
        }

        .login-card{
            width:450px;
            padding:40px;
            border-radius:20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,.3);
        }

        .brand{
            text-align:center;
            margin-bottom:25px;
        }

        .brand h1{
            color:white;
            font-size:2rem;
            font-weight:700;
        }

        .brand p{
            color:#94a3b8;
        }

        label{
            color:#cbd5e1;
        }

        .form-control{
            background:#1e293b;
            color:white;
            border:1px solid #334155;
            height:50px;
        }

        .form-control:focus{
            background:#1e293b;
            color:white;
            border-color:#3b82f6;
            box-shadow:none;
        }

        .btn-login{
            width:100%;
            height:50px;
            font-weight:600;
            border-radius:10px;
        }

        .footer-text{
            text-align:center;
            color:#64748b;
            margin-top:20px;
            font-size:.9rem;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="brand">
        <h1>EMP</h1>
        <p>Employee Management Platform</p>
    </div>

    <div th:if="${param.logout}" class="alert alert-success">
        You have been logged out successfully.
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Invalid email or password.
    </div>

    <form th:action="@{/admin/login}" method="post">

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="username"
                   class="form-control"
                   placeholder="admin@enterprise.com"
                   required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="••••••••"
                   required>
        </div>

        <button type="submit" class="btn btn-primary btn-login">
            Sign In
        </button>

    </form>

    <div class="footer-text">
        Version 1.0 • Spring Boot • JWT • RBAC
    </div>

</div>

</body>
</html>
```
